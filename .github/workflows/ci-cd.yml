name: File Management Pipeline

on:
  push:
    branches: [ "master" ]
  pull_request:
    branches: [ "master" ]

jobs:
  # 1. Étape de Build et Analyse Qualité
  quality-gate:
    runs-on: ubuntu-latest

    # LANCEMENT DE LA BASE DE DONNÉES RÉELLE
    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: password
          MYSQL_DATABASE: file_management
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=3

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

      - name: Build & Sonar Analysis
        working-directory: ./file-managment
        env:
          # Connexion à la base réelle lancée ci-dessus
          SPRING_DATASOURCE_URL: jdbc:mysql://localhost:3306/medclinic
          SPRING_DATASOURCE_USERNAME: root
          SPRING_DATASOURCE_PASSWORD: root
          # Paramètres Sonar
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: ${{ secrets.SONAR_HOST_URL }}
        run: |
          mvn clean verify org.sonarsource.scanner.maven:sonar-maven-plugin:sonar \
            -Dsonar.projectKey=sqa_b3cc78ba8d0daedcf6fd97b3b62febc873151ed7 \
            -Dsonar.projectName='file-managment' \
            -Dsonar.host.url=$SONAR_HOST_URL \
            -Dsonar.token=$SONAR_TOKEN

  # 2. Étape de Build Docker (uniquement si le Quality Gate passe)
  docker-delivery:
    needs: quality-gate
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: ./file-managment
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/file-mgmt:${{ github.ref_name }}
            ${{ secrets.DOCKERHUB_USERNAME }}/file-mgmt:${{ github.sha }}


