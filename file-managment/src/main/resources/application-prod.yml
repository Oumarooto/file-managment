spring:
  datasource:
    url: jdbc:mysql://localhost:3306/file_management_prod?createDatabaseIfNotExist=true
    username: root
    password: password # Sécurité : ne jamais mettre en dur
  jpa:
    hibernate:
      ddl-auto: none # Jamais de "update" en prod !
    show-sql: false


# On peut désactiver Swagger en prod pour la sécurité
springdoc:
  api-docs:
    enabled: false
  swagger-ui:
    enabled: false

file:
  upload-dir: /var/www/app/uploads

server:
  port: 9292  # Port pour stage
  servlet:
    context-path: /api

logging:
  destination: logstash-service:5000 # Nom du service dans votre cluster Docker/K8s