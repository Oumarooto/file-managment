spring:
  application:
    name: file-management
  servlet:
    multipart:
      enabled: true
      max-file-size: 20MB
      max-request-size: 20MB
  profiles:
    active: prod
  devtools:
    restart:
      enabled: false
    livereload:
      enabled: false

server:
  port: 9191
  servlet:
    context-path: /api

file:
  upload-dir: ./uploads

# Configuration Swagger commune
springdoc:
  api-docs:
    path: /v3/api-docs
    enabled: true
  swagger-ui:
    operations-sorter: alpha